name: Revise Article on Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  revise:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'blog-post') &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
          echo "branch=$(echo $PR_DATA | jq -r '.head.ref')" >> $GITHUB_OUTPUT
          echo "sha=$(echo $PR_DATA | jq -r '.head.sha')" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Revise article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: python scripts/revise-article.py

      - name: Commit and push changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --cached --name-only)
          if [ -n "$CHANGES" ]; then
            git commit -m "revision: applique les modifications demandées"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Read article slug
        if: steps.commit.outputs.changed == 'true'
        id: slug
        run: |
          if [ -f article-slug.txt ]; then
            echo "value=$(cat article-slug.txt)" >> $GITHUB_OUTPUT
            rm article-slug.txt
          fi

      - name: Comment PR with preview link
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.commit.outputs.sha }}"
          SLUG="${{ steps.slug.outputs.value }}"
          PREVIEW="https://rawcdn.githack.com/thecharlot/lcpatrimoine-seo/${SHA}/blog/${SLUG}.html"
          gh pr comment ${{ github.event.issue.number }} \
            --body "Modifications appliquées. [Prévisualiser l'article](${PREVIEW})"
