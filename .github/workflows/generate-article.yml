name: Generate Blog Article

on:
  schedule:
    - cron: '0 8 * * 1'  # Lundi 8h UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Thème ou angle souhaité (laisser vide = choix automatique)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TOPIC_HINT: ${{ github.event.inputs.topic }}
        run: python scripts/generate-article.py

      - name: Read article metadata
        id: meta
        run: |
          # Utilise le slug (ASCII-safe) pour le titre de PR si le titre contient des accents
          if [ -f article-slug.txt ]; then
            echo "slug=$(cat article-slug.txt)" >> $GITHUB_OUTPUT
            rm article-slug.txt
          else
            echo "slug=article" >> $GITHUB_OUTPUT
          fi

      - name: Build PR description with preview link
        id: pr_body
        run: |
          BRANCH="blog/${{ github.run_id }}"
          SLUG="${{ steps.meta.outputs.slug }}"
          PREVIEW="https://raw.githack.com/thecharlot/lcpatrimoine-seo/${BRANCH}/blog/${SLUG}.html"
          {
            echo "body<<PREOF"
            if [ -f pr-description.md ]; then
              cat pr-description.md
              rm pr-description.md
            else
              echo "Nouvel article de blog généré automatiquement."
            fi
            echo ""
            echo "### Prévisualisation"
            echo "[$PREVIEW]($PREVIEW)"
            echo "PREOF"
          } >> $GITHUB_OUTPUT

      - name: Read PR title
        id: title
        run: |
          if [ -f article-title.txt ]; then
            {
              echo "value<<TITLEEOF"
              cat article-title.txt
              echo "TITLEEOF"
            } >> $GITHUB_OUTPUT
            rm article-title.txt
          else
            echo "value=Nouvel article de blog" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "blog: ${{ steps.meta.outputs.slug }}"
          branch: blog/${{ github.run_id }}
          title: "📝 ${{ steps.title.outputs.value }}"
          body: ${{ steps.pr_body.outputs.body }}
          labels: blog-post
